name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./ci-quality.db
      JWT_SECRET: ci-jwt-secret-change-me
      JWT_EXPIRES_IN: 7d
      IMAGE_STORAGE_DRIVER: local
      IMAGE_STORAGE_LOCAL_ROOT: ./ci-uploads
      RECIPE_IMPORT_ENABLED: "true"
      RECIPE_IMPORT_EXTRACTOR_DRIVER: rule-based
      RECIPE_IMPORT_HANDWRITTEN_ENABLED: "true"
      RECIPE_IMPORT_HANDWRITTEN_PRIMARY_OCR_PROVIDER: local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Run import tests
        run: npm run test:import

      - name: Run phase 0 tests
        run: npm run test:phase0

      - name: Run phase 1 tests
        run: npm run test:phase1

      - name: Run phase 2 tests
        run: npm run test:phase2

      - name: Run phase 3 tests
        run: npm run test:phase3

  auth-smoke:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./ci.db
      JWT_SECRET: ci-jwt-secret-change-me
      JWT_EXPIRES_IN: 7d
      BASE_URL: http://localhost:3000
      ALICE_PASSWORD: Password123!
      BOB_PASSWORD: Password123!

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --config prisma.config.ts

      - name: Apply migrations
        run: npx prisma migrate deploy --config prisma.config.ts

      - name: Seed database
        run: npx prisma db seed --config prisma.config.ts

      - name: Start app
        run: |
          npm run dev > /tmp/next-dev.log 2>&1 &
          echo $! > /tmp/next-dev.pid

      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -sSf "$BASE_URL/api/recipes" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          if [ -f /tmp/next-dev.log ]; then
            cat /tmp/next-dev.log
          else
            echo "No /tmp/next-dev.log found"
          fi
          exit 1

      - name: Run auth smoke test
        run: ./scripts/auth-smoke-test.sh

      - name: Run route guard smoke test
        run: ./scripts/route-guards-smoke-test.sh

      - name: Run logout smoke test
        run: ./scripts/logout-smoke-test.sh

      - name: Print app logs on failure
        if: failure()
        run: |
          if [ -f /tmp/next-dev.log ]; then
            cat /tmp/next-dev.log
          else
            echo "No /tmp/next-dev.log found"
          fi

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/next-dev.pid ]; then
            kill "$(cat /tmp/next-dev.pid)" || true
          fi
